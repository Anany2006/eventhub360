version: '3.8'

services:
  # Express Node Backend Service
  api-service:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - database-engine

  # Connected PostgreSQL Database Engine
  database-engine:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secure_db_password
      - POSTGRES_DB=enterprise_records
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: