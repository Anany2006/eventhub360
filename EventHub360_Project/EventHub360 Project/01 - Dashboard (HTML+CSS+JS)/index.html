<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventHub360 – Employee Management System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── TOAST ──────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ─── AUTH SCREEN ───────────────────────────────────────── -->
<div id="auth-screen">
<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-circle">🏢</div>
    <h1>EventHub360</h1>
    <p>Employee Management System</p>
  </div>
  <div class="auth-tabs">
    <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
    <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- LOGIN FORM -->
  <div id="login-form">
    <div class="auth-error" id="login-err"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="l-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="l-pass" placeholder="••••••••">
        <span class="pw-toggle" onclick="togglePw('l-pass',this)">👁</span>
      </div>
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In →</button>
    <button class="btn-demo" onclick="demoLogin()">🎓 Demo Login (Admin)</button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signup-form" style="display:none">
    <div class="auth-error" id="signup-err"></div>
    <div class="auth-success" id="signup-ok"></div>
    <div class="form-row">
      <div class="form-group"><label>First Name</label><input type="text" id="s-first" placeholder="Anany"></div>
      <div class="form-group"><label>Last Name</label><input type="text" id="s-last" placeholder="Pandit"></div>
    </div>
    <div class="form-group"><label>Email</label><input type="email" id="s-email" placeholder="you@example.com"></div>
    <div class="form-group">
      <label>Domain / Branch</label>
      <select id="s-domain">
        <option value="">Select domain</option>
        <option>AI / ML</option><option>Software Engineer</option><option>Human Resource</option>
        <option>Data Analytics</option><option>Cybersecurity</option><option>Cloud Computing</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Role</label>
        <select id="s-role"><option>Admin</option><option>Manager</option><option>Student</option></select>
      </div>
      <div class="form-group">
        <label>City</label>
        <select id="s-city">
          <option value="">Select city</option>
          <option>Indore</option><option>Mumbai</option><option>Delhi</option><option>Bangalore</option>
          <option>Pune</option><option>Hyderabad</option><option>Chennai</option><option>Jaipur</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="s-pass" placeholder="Min 8 chars" oninput="checkStrength(this)">
        <span class="pw-toggle" onclick="togglePw('s-pass',this)">👁</span>
      </div>
      <div class="strength-bar"><div class="fill" id="strength-fill" style="width:0%"></div></div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" id="s-confirm" placeholder="••••••••">
      </div>
    </div>
    <button class="btn-primary" onclick="doSignup()">Create Account →</button>
  </div>
</div>
</div>

<!-- ─── APP ───────────────────────────────────────────────── -->
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-row">
        <div class="brand-dot">🏢</div>
        <div><div class="brand-name">EventHub360</div><div class="brand-sub">EMS Dashboard</div></div>
      </div>
    </div>
    <nav>
      <div class="nav-label">Main</div>
      <div class="nav-item active" onclick="goPage('overview',this)"><span class="icon">📊</span> Overview</div>
      <div class="nav-item" onclick="goPage('students',this)"><span class="icon">🎓</span> Students</div>
      <div class="nav-item" onclick="goPage('attendance',this)"><span class="icon">🗓</span> Attendance</div>
      <div class="nav-item" onclick="goPage('salary',this)"><span class="icon">💰</span> Salary Report</div>
      <div class="nav-item" onclick="goPage('analytics',this)"><span class="icon">📈</span> Analytics</div>
    </nav>
    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar" id="u-avatar">?</div>
        <div><div class="user-name" id="u-name">—</div><div class="user-role" id="u-role">—</div></div>
      </div>
      <button class="btn-signout" onclick="signOut()">↩ Sign Out</button>
    </div>
  </aside>

  <div id="main">
    <div class="topbar">
      <h2 id="page-title">Overview</h2>
      <div class="topbar-right">
        <span class="badge" id="topbar-badge">40 Employees</span>
        <span style="font-size:12px;color:var(--silver)" id="topbar-date"></span>
      </div>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
